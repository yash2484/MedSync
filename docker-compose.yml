services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: medsync
      POSTGRES_PASSWORD: medsync
      POSTGRES_DB: medsync
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medsync"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    # Apply migrations before serving so the stack is usable right after `up`.
    # --reload + the source bind-mount give instant code reloads in dev.
    command: sh -c "alembic upgrade head && uvicorn medsync.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: postgresql+asyncpg://medsync:medsync@postgres:5432/medsync
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ./server:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./server
      dockerfile: Dockerfile
    command: celery -A medsync.celery_app.celery worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://medsync:medsync@postgres:5432/medsync
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ./server:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
